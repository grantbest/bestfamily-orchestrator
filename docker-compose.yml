services:
  agent-orchestrator:
    build:
      context: ..
      dockerfile: BestFam-Orchestrator/Dockerfile.orchestrator
    container_name: agent-orchestrator
    restart: always
    env_file: ../Homelab/shared-services/.env
    environment:
      - PYTHONUNBUFFERED=1
      - TEMPORAL_ADDRESS=temporal:7233
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - PYTHONPATH=/app/Homelab/scripts:/app/BestFam-Orchestrator
    volumes:
      - /Users/grantbest/Documents/Active/Homelab:/app/Homelab
      - /Users/grantbest/Documents/Active/BettingApp:/app/BettingApp
      - /Users/grantbest/Documents/Active/BestFam-Orchestrator:/app/BestFam-Orchestrator
    networks:
      - homelab_global
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  homelab_global:
    external: true
